server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets never change — cache them forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must always be revalidated so deploys take effect.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — createBrowserRouter needs every deep link to serve
    # index.html or refreshes and direct links 404.
    location / {
        try_files $uri /index.html;
    }
}
